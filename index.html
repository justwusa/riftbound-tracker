<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Riftbound Tracker</title>
  <!-- externes CSS einbinden -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Riftbound Karten Tracker</h1>

<div>
  <button onclick="showTab('cards')">Alle Karten</button>
  <button onclick="showTab('decks')">Decks</button>
</div>

<div id="cardsTab">
  <input id="search" placeholder="Suche..." oninput="render()">
  <p id="stats"></p>
  <div id="list"></div>
</div>

<div id="decksTab" style="display:none;">
  <h2>Decks</h2>
  <p>Hier kommen später deine Decks rein 👀</p>
</div>

<!-- externes JS einbinden -->
<script src="script.js"></script>
</body>
</html>
